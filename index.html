      // State
      let state = {
        mode: null, // 'normal' or 'failed'
        questions: [],
        current: 0,
        answers: {},
        revealed: {},
        failed: new Set(JSON.parse(localStorage.getItem("failed") || "[]")),
        sessionFailed: new Set(),
      };

      function saveFailed() {
        localStorage.setItem("failed", JSON.stringify([...state.failed]));
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function startTest(mode) {
        state.mode = mode;
        state.answers = {};
        state.revealed = {};
        state.sessionFailed = new Set();
        state.current = 0;

        if (mode === "normal") {
          state.questions = shuffle(ALL_QUESTIONS).slice(0, 30);
        } else {
          const failedQs = ALL_QUESTIONS.filter((q) => state.failed.has(q.n));
          if (failedQs.length === 0) {
            alert("No tienes preguntas falladas guardadas.");
            return;
          }
          state.questions = shuffle(failedQs).slice(
            0,
            Math.min(30, failedQs.length),
          );
        }
        render();
      }

      function render() {
        const main = document.getElementById("main");
        if (state.mode === null) {
          renderMenu(main);
        } else if (state.current < state.questions.length) {
          renderQuestion(main);
        } else {
          renderResults(main);
        }
      }

      function renderMenu(main) {
        const failedCount = state.failed.size;
        main.innerHTML = `
    <div id="menu">
      <h2>Selecciona modo</h2>
      <button class="btn" onclick="startTest('normal')">🎲 Test aleatorio (30 preguntas)</button>
      <br><br>
      <button class="btn secondary" onclick="startTest('failed')" ${failedCount === 0 ? "disabled" : ""}>
        ❌ Repasar falladas${failedCount > 0 ? ` (${failedCount})` : ""}
      </button>
      ${failedCount > 0 ? `<br><br><button class="btn danger" onclick="clearFailed()">🗑️ Borrar historial de fallos</button>` : ""}
      <br><br>
      <p style="color:#888;font-size:0.85em;">Las preguntas falladas se guardan automáticamente entre sesiones.</p>
    </div>`;
      }

      function clearFailed() {
        if (confirm("¿Borrar todas las preguntas falladas?")) {
          state.failed = new Set();
          saveFailed();
          render();
        }
      }

      function renderQuestion(main) {
        const q = state.questions[state.current];
        const total = state.questions.length;
        const answered = Object.keys(state.answers).length;
        const progress = ((state.current / total) * 100).toFixed(0);
        const isRevealed = state.revealed[q.n];
        const userAnswer = state.answers[q.n];

        const letters = ["a", "b", "c", "d"];
        let optsHtml = q.opts
          .map((opt, i) => {
            let cls = "";
            if (isRevealed) {
              if (i === q.correct) cls = "correct";
              else if (i === userAnswer) cls = "wrong";
            }
            const checked = userAnswer === i ? "checked" : "";
            const disabled = isRevealed
              ? 'onclick="return false" style="cursor:default"'
              : "";
            return `<label class="${cls}">
      <input type="radio" name="q${q.n}" value="${i}" ${checked} ${isRevealed ? "disabled" : ""} onchange="selectAnswer(${q.n},${i})">
      <strong>${letters[i]})</strong> ${opt}
    </label>`;
          })
          .join("");

        const modeTag =
          state.mode === "failed"
            ? '<span id="mode-indicator">Modo: Falladas</span>'
            : "";

        main.innerHTML = `
    <div id="progress-bar"><div id="progress-fill" style="width:${progress}%"></div></div>
    <div id="stats-bar">
      <span>Pregunta <strong>${state.current + 1}</strong> de <strong>${total}</strong></span>
      ${modeTag}
      <span>Respondidas: ${answered}/${total}</span>
    </div>
    <div class="q-card">
      <div class="q-num">Pregunta ${q.n}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${
        isRevealed
          ? `<div style="margin-top:10px;padding:8px;background:#f0f8f0;border-radius:4px;font-size:0.9em;">
        ✅ Respuesta correcta: <strong>${letters[q.correct]}) ${q.opts[q.correct]}</strong>
      </div>`
          : ""
      }
      <div class="q-actions">
        ${!isRevealed ? `<button class="btn" onclick="revealAnswer(${q.n})" ${userAnswer === undefined ? "disabled" : ""}>Ver respuesta</button>` : ""}
      </div>
    </div>
    <div id="nav">
      <button class="btn" onclick="prev()" ${state.current === 0 ? "disabled" : ""}>← Anterior</button>
      <span style="font-size:0.85em;color:#666">${state.current + 1}/${total}</span>
      ${
        state.current < total - 1
          ? `<button class="btn" onclick="next()">Siguiente →</button>`
          : `<button class="btn success" onclick="finish()">Finalizar ✓</button>`
      }
    </div>`;
      }

      function selectAnswer(qn, val) {
        state.answers[qn] = val;
        render();
      }

      function revealAnswer(qn) {
        const q = ALL_QUESTIONS.find((x) => x.n === qn);
        state.revealed[qn] = true;
        const userAns = state.answers[qn];
        if (userAns !== q.correct) {
          state.failed.add(qn);
          state.sessionFailed.add(qn);
        } else {
          // Remove from failed if answered correctly
          if (state.failed.has(qn)) {
            state.failed.delete(qn);
          }
        }
        saveFailed();
        render();
      }

      function next() {
        if (state.current < state.questions.length - 1) {
          state.current++;
          render();
        }
      }

      function prev() {
        if (state.current > 0) {
          state.current--;
          render();
        }
      }

      function finish() {
        // Reveal all unrevealed answered questions
        state.questions.forEach((q) => {
          if (state.answers[q.n] !== undefined && !state.revealed[q.n]) {
            revealAnswer(q.n);
          }
        });
        state.current = state.questions.length;
        render();
      }

      function renderResults(main) {
        const total = state.questions.length;
        const revealed = Object.keys(state.revealed).length;
        let correct = 0;
        let wrong = 0;
        let skipped = 0;

        state.questions.forEach((q) => {
          if (state.revealed[q.n]) {
            if (state.answers[q.n] === q.correct) correct++;
            else wrong++;
          } else {
            skipped++;
          }
        });

        const pct = revealed > 0 ? Math.round((correct / total) * 100) : 0;
        const pass = pct >= 65;

        const failedList = state.questions
          .filter(
            (q) => state.revealed[q.n] && state.answers[q.n] !== q.correct,
          )
          .map(
            (q) =>
              `<li style="margin:4px 0;font-size:0.85em">P.${q.n}: ${q.q.substring(0, 80)}...</li>`,
          )
          .join("");

        main.innerHTML = `
    <div id="results">
      <h2>Resultado del test</h2>
      <div class="score ${pass ? "pass" : "fail"}">${correct}/${total} (${pct}%)</div>
      <div class="details">
        ✅ Correctas: <strong>${correct}</strong> &nbsp;|&nbsp;
        ❌ Incorrectas: <strong>${wrong}</strong> &nbsp;|&nbsp;
        ⏭️ Sin contestar: <strong>${skipped}</strong>
      </div>
      <div style="margin:10px 0;padding:8px;background:${pass ? "#d4edda" : "#f8d7da"};border-radius:6px;font-weight:bold">
        ${pass ? "✅ ¡Aprobado!" : "❌ Suspenso (mínimo 65%)"}
      </div>
      ${state.sessionFailed.size > 0 ? `<p style="color:#888;font-size:0.85em">Se han guardado ${state.sessionFailed.size} pregunta(s) fallada(s) para repasar.</p>` : ""}
      ${failedList ? `<details style="text-align:left;margin-top:10px"><summary style="cursor:pointer;color:#c0392b">Ver preguntas falladas en este test</summary><ul style="padding-left:20px;margin-top:8px">${failedList}</ul></details>` : ""}
      <br>
      <button class="btn" onclick="startTest('normal')">🎲 Nuevo test</button>
      &nbsp;
      <button class="btn secondary" onclick="goMenu()">← Menú</button>
    </div>`;
      }

      function goMenu() {
        state.mode = null;
        render();
      }

      render();
    </script>
  </body>
</html>
